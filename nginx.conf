server {
    listen 3000;
    client_max_body_size 12m;

    # Serve React static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Service worker and manifest must never be served from an HTTP cache.
    # A stale SW that hasn't precached index.html will cause ERR_INTERNET_DISCONNECTED
    # on offline refreshes, because the navigation falls through to the network.
    location ~* ^/(sw\.js|manifest\.webmanifest|registerSW\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed assets are immutable – long-lived caching is safe.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy REST API requests to the backend
    location /api/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Proxy Socket.io — must handle WebSocket upgrades
    location /socket.io/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;  # keep WS alive
        proxy_send_timeout 86400s;
    }
}
