services:

  mongo:
    image: mongo:7
    container_name: journal-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Not exposed externally — only reachable by the api service

  app:
    build:
      context: .
      args:
        VITE_DISABLE_WEBSOCKETS: ${DISABLE_WEBSOCKETS:-true}
    container_name: journal-app
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      PORT: 3000
      DISABLE_WEBSOCKETS: ${DISABLE_WEBSOCKETS:-true}
    ports:
      - "3000:3000"
    depends_on:
      - mongo

volumes:
  mongo_data:
