name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build frontend
        run: |
          npm ci
          npm run build
          echo "✅ Frontend build succeeded"

      - name: Install & check server
        working-directory: server
        run: |
          npm ci
          echo "✅ Server deps installed"

      - name: Comment build status on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const body = `### ${status} Build Check
            
            | Check | Result |
            |-------|--------|
            | Frontend build | ${{ steps.check.outcome == 'success' && '✅ Pass' || '⏳ See logs' }} |
            | Server deps | ${{ steps.check.outcome == 'success' && '✅ Pass' || '⏳ See logs' }} |
            
            _Commit: \`${{ github.sha }}\`_`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
