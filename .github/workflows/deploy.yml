name: CI/CD → Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  API_SERVICE: journal-api
  WEB_SERVICE: journal-web

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build frontend
        run: npm ci && npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci

  # ── Job 2: Build, Push & Deploy ─────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # Build images — set shell variables once, use them everywhere in this job
      - name: Build & push images
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          REGISTRY="gcr.io/${PROJECT_ID}"

          API_IMAGE="${REGISTRY}/${{ env.API_SERVICE }}:${SHA}"
          WEB_IMAGE="${REGISTRY}/${{ env.WEB_SERVICE }}:${SHA}"

          echo "API_IMAGE=${API_IMAGE}" >> $GITHUB_ENV
          echo "WEB_IMAGE=${WEB_IMAGE}" >> $GITHUB_ENV

          # Build & push API
          docker build --platform linux/amd64 -t "${API_IMAGE}" ./server
          docker push "${API_IMAGE}"

          # Build & push Web
          docker build --platform linux/amd64 \
            --build-arg API_URL="${API_URL}" \
            -t "${WEB_IMAGE}" \
            -f Dockerfile.cloudrun .
          docker push "${WEB_IMAGE}"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "${{ env.API_IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 4000 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=${{ secrets.SMTP_PORT }},SMTP_SECURE=${{ secrets.SMTP_SECURE }},SMTP_USER=${{ secrets.SMTP_USER }},EMAIL_FROM=${{ secrets.EMAIL_FROM }}" \
            --update-secrets "MONGO_URI=journal-mongo-uri:latest,SMTP_PASS=journal-smtp-pass:latest" \
            --quiet

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image "${{ env.WEB_IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --quiet

      - name: Print deployment URLs
        run: |
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
            --region ${{ env.REGION }} --format "value(status.url)")
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} --format "value(status.url)")

          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |"         >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|"         >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web  | ${WEB_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 API  | ${API_URL} |" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "🌐 Web: ${WEB_URL}"
          echo "🔌 API: ${API_URL}"
