name: CI/CD → Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  APP_SERVICE: daily-journal

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install & build frontend
        run: npm ci && npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci

  # ── Job 2: Build, Push & Deploy ─────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # Build image — set shell variables once, use them everywhere in this job
      - name: Build & push app image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DISABLE_WEBSOCKETS: ${{ secrets.DISABLE_WEBSOCKETS || 'true' }}
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          REGISTRY="gcr.io/${PROJECT_ID}"

          APP_IMAGE="${REGISTRY}/${{ env.APP_SERVICE }}:${SHA}"

          echo "APP_IMAGE=${APP_IMAGE}" >> $GITHUB_ENV

          # Build & push merged app container
          docker build --platform linux/amd64 \
            --build-arg VITE_DISABLE_WEBSOCKETS="${DISABLE_WEBSOCKETS:-true}" \
            -t "${APP_IMAGE}" \
            .
          docker push "${APP_IMAGE}"

      - name: Deploy app to Cloud Run
        run: |
          gcloud run deploy ${{ env.APP_SERVICE }} \
            --image "${{ env.APP_IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "DISABLE_WEBSOCKETS=${{ secrets.DISABLE_WEBSOCKETS || 'true' }},SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=${{ secrets.SMTP_PORT }},SMTP_SECURE=${{ secrets.SMTP_SECURE }},SMTP_USER=${{ secrets.SMTP_USER }},EMAIL_FROM=${{ secrets.EMAIL_FROM }}" \
            --update-secrets "MONGO_URI=journal-mongo-uri:latest,SMTP_PASS=journal-smtp-pass:latest" \
            --quiet

      - name: Print deployment URLs
        run: |
          APP_URL=$(gcloud run services describe ${{ env.APP_SERVICE }} \
            --region ${{ env.REGION }} --format "value(status.url)")

          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |"         >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|"         >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 App  | ${APP_URL} |" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "🌐 App: ${APP_URL}"
