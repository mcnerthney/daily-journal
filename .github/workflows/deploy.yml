name: CI/CD → Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  API_SERVICE: journal-api
  WEB_SERVICE: journal-web
  REGISTRY: gcr.io

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend (type-check)
        run: npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Check server starts (smoke test)
        working-directory: server
        run: |
          # Start server with a dummy mongo URI — just check it doesn't crash at import
          timeout 5s node --input-type=module <<'EOF' || true
          import express from "express";
          import { createServer } from "http";
          import { Server } from "socket.io";
          console.log("✅ Server imports OK");
          EOF

  # ── Job 2: Build & Push Docker Images ──────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      api_image: ${{ steps.meta-api.outputs.image }}
      web_image: ${{ steps.meta-web.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Set image tags
        id: meta-api
        run: |
          SHA="${{ github.sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.API_SERVICE }}"
          echo "image=${IMAGE}:${SHA::8}" >> $GITHUB_OUTPUT
          echo "latest=${IMAGE}:latest"   >> $GITHUB_OUTPUT

      - name: Set web image tag
        id: meta-web
        run: |
          SHA="${{ github.sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.WEB_SERVICE }}"
          echo "image=${IMAGE}:${SHA::8}" >> $GITHUB_OUTPUT
          echo "latest=${IMAGE}:latest"   >> $GITHUB_OUTPUT

      - name: Build & push API image
        run: |
          IMAGE="${{ steps.meta-api.outputs.image }}"
          LATEST="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.API_SERVICE }}:latest"
          docker build --platform linux/amd64 -t "$IMAGE" -t "$LATEST" ./server
          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Build & push Web image
        run: |
          IMAGE="${{ steps.meta-web.outputs.image }}"
          LATEST="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.WEB_SERVICE }}:latest"
          docker build --platform linux/amd64 \
            --build-arg API_URL="${{ secrets.API_URL }}" \
            -t "$IMAGE" -t "$LATEST" \
            -f Dockerfile.cloudrun .
          docker push "$IMAGE"
          docker push "$LATEST"

  # ── Job 3: Deploy to Cloud Run ──────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy API service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ needs.build.outputs.api_image }}
          secrets: |
            MONGO_URI=journal-mongo-uri:latest
          flags: |
            --port=4000
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --allow-unauthenticated

      - name: Deploy Web service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ needs.build.outputs.web_image }}
          env_vars: |
            API_URL=${{ secrets.API_URL }}
          flags: |
            --port=3000
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --allow-unauthenticated

      - name: Print deployment URLs
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} --region ${{ env.REGION }} --format "value(status.url)")
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} --region ${{ env.REGION }} --format "value(status.url)")
          echo "| 🌐 Web | $WEB_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 API | $API_URL |" >> $GITHUB_STEP_SUMMARY
